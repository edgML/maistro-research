      tags:
        - Auth Configs
      summary: "Create new authentication configuration"
      responses:
        '200':
          description: See full operation in docs/public/openapi.json
  "/api/v3.1/auth_configs/{nanoid}":
    get:
      parameters:
        - name: nanoid
          in: path
          required: true
          schema:
            type: string
      tags:
        - Auth Configs
      summary: "Get single authentication configuration by ID"
