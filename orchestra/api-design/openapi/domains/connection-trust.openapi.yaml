openapi: 3.0.3
info:
  title: "Maistro API — Connection and trust (domain slice)"
  description: |
    DDD bounded context: **connection-trust** — auth configs, connected accounts, link flows, auth session info.
        Curated slice; canonical spec: `docs/public/openapi.json`.
  version: "1.0.0"
  x-domain-slug: "connection-trust"
servers:
  - url: https://backend.maistro.dev
    description: Production
tags:
  - name: "Authentication"
  - name: "Auth Configs"
  - name: "Connected Accounts"

paths:
  "/api/v3.1/auth/session/info":
    get:
      tags:
        - Authentication
      summary: "Get current user session information"
      responses:
        '200':
          description: See full operation in docs/public/openapi.json
  "/api/v3.1/auth_configs":
